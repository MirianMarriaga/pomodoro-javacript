<!DOCTYPE html>
<html lang="en">
  <head>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=EG+Garamond:wght@400;500;600;700&family=Fira+Sans:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="./style.css" />
  <title>Pomodoro App</title>
</head>
  <body>
    <div class="app-container">
        <h1>pomodoro</h1>
        <div class="app-message">Choose a session length</div>
        <div class="app-circle">
            <div class="circle-shape">
            <div class="semi-circle right-side circle-mask"></div>
            <div class="semi-circle right-side circle"></div>
            <div class="semi-circle left-side circle-mask"></div>
            <div class="semi-circle left-side circle"></div>
            </div>
            <div class="app-counter-box">
                <p><span class="minutes">25</span>:<span class="seconds">00</span></p>
            </div>
            <button class="btn-start">start</button>
        </div>

                
        <div class="options">
            <button class="option-btn" id="option-25">work</button>
            <button class="option-btn" id="option-5">break</button>
            <button class="option-btn" id="option-15">long break</button>
        </div>

        <hr>

        <div class="tasks-container">
            <p class="tasks" id="tasks-title">Tasks:</p>
            <p class="tasks" id="tasks-count">0</p>
            <button class="tasks" id="btn-add-task">+</button>
            <button class="tasks" id="btn-clear-tasks">-</button>
        </div>

    </div>
  </body>
  <script src="./app.js"></script>
</html>
